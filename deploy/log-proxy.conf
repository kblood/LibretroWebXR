# Apache drop-in that exposes the log server's HTTP API at /log/ and /logs/
# on the same origin as the app, so the browser can POST from a Quest session
# without cross-origin issues.
#
# The log server (server/log-server.mjs) runs as part of the room server process
# on LOG_PORT=8788 (127.0.0.1 only). This conf reverse-proxies it through Apache.
#
# Install (one-off, same box as libretrowebxr-room.service):
#   sudo cp deploy/log-proxy.conf /etc/apache2/conf-available/
#   sudo a2enmod proxy proxy_http      # if not already enabled
#   sudo a2enconf log-proxy
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Pairs with:
#   deploy/libretrowebxr-room.conf  — /ws/ WebSocket proxy
#   deploy/libretrowebxr-room.service — the Node process (now also starts log-server)
#
# After this is live:
#   POST https://dionysus.dk/log        → log ingestion (from Quest)
#   GET  https://dionysus.dk/logs       → HTML viewer (from PC)
#   GET  https://dionysus.dk/logs.json  → raw JSON

ProxyPass        /log   http://127.0.0.1:8788/log
ProxyPassReverse /log   http://127.0.0.1:8788/log

ProxyPass        /logs  http://127.0.0.1:8788/logs
ProxyPassReverse /logs  http://127.0.0.1:8788/logs
