# Scoped AllowOverride for the LibretroWebXR project. Lets the deploy's own
# .htaccess set Cross-Origin-Embedder-Policy + Cross-Origin-Opener-Policy,
# which window.crossOriginIsolated (and therefore SharedArrayBuffer, which
# the libretro worker core needs for its pthread pool) gates on.
#
# Mirrors the pattern used for /webxr/IWSDK/ — other /webxr/* projects are
# untouched.
<Directory /var/www/html/webxr/libretrowebxr/>
    AllowOverride FileInfo Indexes
</Directory>
