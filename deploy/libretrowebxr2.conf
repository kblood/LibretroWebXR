# Scoped AllowOverride for the LibretroWebXR2 deploy (the Phase E.1+ build, kept
# separate from the working /webxr/libretrowebxr/ so the original is untouched).
# Lets the deploy's own .htaccess set Cross-Origin-Embedder-Policy +
# Cross-Origin-Opener-Policy, which window.crossOriginIsolated (and therefore
# SharedArrayBuffer, which the threaded libretro cores need) gates on.
#
# Install once (root) and reload Apache; the .htaccess is inert without it:
#   sudo cp libretrowebxr2.conf /etc/apache2/conf-available/   # or sites' include dir
#   sudo a2enconf libretrowebxr2 && sudo systemctl reload apache2
<Directory /var/www/html/webxr/libretrowebxr2/>
    AllowOverride FileInfo Indexes
</Directory>
