# Apache drop-in that exposes the M0 presence room server (WebSocket) at
# /ws/ on the same origin as the app, so the browser reaches wss://<host>/ws/
# (COOP/COEP-friendly — no cross-origin upgrade).
#
# Install on the box (matches the per-folder COOP/COEP conf pattern):
#   sudo cp deploy/libretrowebxr-room.conf /etc/apache2/conf-available/
#   sudo a2enmod proxy proxy_wstunnel        # (already enabled on dionysus.dk)
#   sudo a2enconf libretrowebxr-room
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Pairs with the room server itself (deploy/libretrowebxr-room.service →
# /opt/libretrowebxr-room, listening on 127.0.0.1:8787). See server/README.md.
#
# Installed on dionysus.dk 2026-06-09 (conf-enabled; global scope — harmless to
# the ai./rpg. subdomain vhosts, which simply never call /ws/).

ProxyPass        /ws/  ws://127.0.0.1:8787/
ProxyPassReverse /ws/  ws://127.0.0.1:8787/
