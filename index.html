<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>LibretroWebXR</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; background: #111; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }
      body { display: flex; flex-direction: column; }
      header { padding: 12px 16px; display: flex; gap: 12px; align-items: center; width: 100%; box-sizing: border-box; background: #1b1b1b; border-bottom: 1px solid #2a2a2a; z-index: 2; }
      header h1 { margin: 0; font-size: 14px; font-weight: 500; letter-spacing: .04em; color: #888; }
      header .sp { flex: 1; }
      header button, header label, header a { font: inherit; background: #2a2a2a; color: #eee; border: 1px solid #3a3a3a; border-radius: 6px; padding: 6px 10px; cursor: pointer; text-decoration: none; }
      header button:hover, header label:hover, header a:hover { background: #333; }
      header input[type=file] { display: none; }
      #status { font-size: 12px; color: #888; }

      /* Multiplayer join widget — collapses to a slim status bar when offline */
      #mp-widget { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; }
      #mp-widget input[type=text] {
        font: inherit; background: #1e1e1e; color: #eee;
        border: 1px solid #3a3a3a; border-radius: 6px;
        padding: 5px 8px; width: 100px; min-width: 0; box-sizing: border-box;
      }
      #mp-widget input[type=text]:focus { outline: 1px solid #556; }
      #mp-widget input[type=color] {
        width: 28px; height: 28px; padding: 2px; border: 1px solid #3a3a3a;
        border-radius: 6px; background: #1e1e1e; cursor: pointer;
      }
      #mp-status { font-size: 11px; white-space: nowrap; }
      #mp-status.online { color: #66dd99; }
      #mp-status.offline { color: #666; }
      /* Hide detailed join fields when already connected */
      .mp-connected #mp-join-fields { display: none; }
      .mp-disconnected #mp-leave-btn { display: none; }
      .mp-disconnected #mp-join-btn { display: inline; }
      /* Label the widget group */
      #mp-label { font-size: 11px; color: #666; white-space: nowrap; }

      /* The Three.js renderer is appended into #stage. It fills the area
         under the header in both desktop and VR mode. */
      #stage { flex: 1; position: relative; width: 100%; min-height: 0; }
      #stage canvas { display: block; width: 100%; height: 100%; }

      /* Two offscreen canvases drive the TV mesh's texture:
         - #placeholder-canvas: 2D context, animated by Placeholder while idle.
         - #canvas:             WebGL context grabbed by the libretro core.
         The emulator canvas MUST be id="canvas" — RetroArch's web input
         driver does an internal querySelector('#canvas') for input events
         and silently breaks (null deref in addEventListener) if absent. */
      #placeholder-canvas, #canvas {
        position: absolute; left: -99999px; top: -99999px; image-rendering: pixelated;
      }

      /* Three.js's VRButton is fixed-position; nudge it above the canvas. */
      body > button { z-index: 3 !important; }

      /* Desktop (flat-screen) controls overlay. The crosshair shows only once
         the mouse is captured (body.pointer-locked, set by DesktopControls); the
         hint shows until then. Both are non-interactive and sit over the canvas. */
      #crosshair {
        position: absolute; left: 50%; top: 50%; width: 8px; height: 8px;
        margin: -4px 0 0 -4px; border-radius: 50%;
        background: rgba(255,255,255,.85); box-shadow: 0 0 2px #000;
        pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 2;
      }
      body.pointer-locked #crosshair { opacity: 1; }
      #desktop-hint {
        position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
        font-size: 12px; color: #cfd6e6; background: rgba(20,20,30,.72);
        border: 1px solid #2a2a3a; border-radius: 6px; padding: 6px 12px;
        pointer-events: none; opacity: .9; transition: opacity .25s; z-index: 2;
        white-space: nowrap;
      }
      body.pointer-locked #desktop-hint { opacity: 0; }

      /* Desktop controller-binding overlay (flat-screen only). A plain modal
         panel for remapping keyboard keys + PC-gamepad buttons to RetroPad
         buttons (see src/BindingsUI.js). Scoped under #bindings-overlay so the
         look is easy to restyle later. */
      #bindings-overlay {
        position: absolute; inset: 0; z-index: 10;
        display: flex; align-items: center; justify-content: center;
        background: rgba(8,10,18,.6);
      }
      #bindings-overlay[hidden] { display: none; }
      #bindings-panel {
        width: min(440px, 92vw); max-height: 86vh; overflow: auto;
        background: #161a26; color: #e6e9f2;
        border: 1px solid #2a2f40; border-radius: 10px;
        box-shadow: 0 8px 40px rgba(0,0,0,.5);
        padding: 16px 18px; font-size: 13px;
      }
      #bindings-panel h2 { margin: 0 0 4px; font-size: 16px; }
      #bindings-panel .sub { margin: 0 0 12px; color: #8b93a7; font-size: 11px; }
      .binding-row {
        display: grid; grid-template-columns: 1fr 96px 96px; gap: 8px;
        align-items: center; padding: 4px 0;
      }
      .binding-name { font-weight: 600; }
      .binding-cell {
        font: inherit; color: #e6e9f2; background: #20253580;
        border: 1px solid #333a4d; border-radius: 5px; padding: 5px 8px;
        cursor: pointer; text-align: center;
      }
      .binding-cell:hover { background: #2a3146; }
      .binding-cell.capturing { background: #3a5f2a; border-color: #6fbf4a; }
      #bindings-head { display: grid; grid-template-columns: 1fr 96px 96px; gap: 8px;
        color: #8b93a7; font-size: 11px; margin-bottom: 4px; }
      #bindings-actions { display: flex; gap: 8px; margin-top: 14px; }
      #bindings-actions button { font: inherit; cursor: pointer; padding: 6px 14px;
        border-radius: 6px; border: 1px solid #333a4d; background: #232a3c; color: #e6e9f2; }
      #bindings-actions button:hover { background: #2c3550; }
      #bindings-reset { margin-left: auto; }
    </style>
  </head>
  <body>
    <header>
      <h1>LibretroWebXR · idle</h1>
      <label for="rom-input">Load ROM</label>
      <input id="rom-input" type="file" multiple accept=".smc,.sfc,.swc,.fig,.bs,.nes,.fds,.a26,.bin,.md,.gen,.smd,.gba,.vb,.vboy,.sms,.gg,.pce,.gb,.gbc,.d64,.t64,.prg,.crt,.chd,.cue,.m3u,.ccd,.pbp,.exe,.img,.iso,.sub,.sbi,.elf,.cso,.isz" />
      <label for="firmware-input" title="Import a PSX BIOS (SCPH-550x) — validated + stored locally, never uploaded">Import BIOS</label>
      <input id="firmware-input" type="file" accept=".bin" />
      <button id="rom-folder-btn" hidden title="Grant a local ROM library folder; games with rom.source=&quot;local&quot; resolve against it">ROM folder…</button>
      <!-- Images folder: grant once via File System Access API (works on Quest inside XR).
           After granting, open Change mode → "Poster Images…" to pick from the folder.
           Hidden when the File System Access API is unavailable (FSA check in main.js). -->
      <button id="images-folder-btn" hidden title="Grant a folder of images for poster art. Works on Quest inside VR — the in-VR 'Poster Images…' gallery then lists your images as thumbnail buttons.">Images folder…</button>
      <button id="reset-btn" disabled>Reset</button>
      <button id="export-room-btn" title="Download the current room layout as a *.room.json (also reflects in-VR edits)">Export Room</button>
      <label for="import-room-input" title="Import a *.room.json or *.collection.json — reloads the page with the chosen file (same path as drag-and-drop). Use ?room=default in the URL to reset to the built-in layout.">Import Room</label>
      <input id="import-room-input" type="file" accept=".json" />
      <!-- Set Poster Image: desktop/header affordance for custom poster art.
           In-VR file picking is unreliable on Quest — Quest users use the
           in-VR "Cycle Selected" button (Change mode) to cycle built-in styles.
           Desktop: select the poster prop (Change mode → grip), then use this
           button to apply a local image file or paste a URL.
           The chosen source is written into the selected poster's descriptor
           so Export Room + auto-load persist it. -->
      <button id="set-poster-btn" title="Apply a custom image to the selected poster prop (desktop only — select it first in Change mode). In VR, use Change → Cycle Selected for built-in styles.">Set Poster Image…</button>
      <!-- Hidden file input for the poster image picker -->
      <input id="poster-img-input" type="file" accept="image/*" style="display:none" />
      <button id="kbd-toggle-btn" title="Show/hide the C64/VIC-20 virtual keyboard (also in the VR menu)">Keyboard: Off</button>
      <!-- Desktop controller-binding setup: remap keyboard keys + PC gamepad to
           the emulated RetroPad (flat-screen only; see src/BindingsUI.js). -->
      <button id="bindings-btn" title="Remap keyboard keys and PC gamepad buttons to the emulated controller (desktop only)">⚙ Controls</button>
      <button id="voice-btn" hidden title="Enable voice chat with others in this room (?session)">🎤 Voice</button>
      <a id="headset-test-link" href="./headset-test.html" title="Open the in-headset VR smoke-test checklist">🧪 Headset Test</a>
      <span class="sp"></span>

      <!-- Multiplayer join/leave widget. In-app alternative to ?session= URL param.
           Shows as: [Room input] [Nick input] [Color] [Join] while offline.
           Collapses to: [Room: name – N players] [Leave] while connected. -->
      <div id="mp-widget" class="mp-disconnected" title="Multiplayer: join a shared room">
        <span id="mp-label">MP:</span>
        <div id="mp-join-fields" style="display:contents">
          <input id="mp-room-input" type="text" placeholder="room name" maxlength="40"
                 title="Room name — everyone with the same name shares the room" />
          <input id="mp-nick-input" type="text" placeholder="nick" maxlength="20"
                 title="Your display name in the room" />
          <input id="mp-color-input" type="color" value="#88aaff"
                 title="Your avatar color" />
        </div>
        <button id="mp-join-btn" title="Join the multiplayer room">Join</button>
        <button id="mp-leave-btn" title="Leave the multiplayer room">Leave</button>
        <span id="mp-status" class="offline">Offline</span>
      </div>

      <span id="status">idle</span>
    </header>
    <main id="stage">
      <div id="crosshair"></div>
      <div id="desktop-hint">Click to look · WASD move · L-click select · R-click grab · Esc release</div>

      <!-- Desktop controller-binding modal (hidden until "⚙ Controls" is clicked).
           Rows are generated by src/BindingsUI.js from the Bindings model. -->
      <div id="bindings-overlay" hidden>
        <div id="bindings-panel">
          <h2>Controller bindings</h2>
          <p class="sub">Player 1 · desktop only. Click a cell, then press a key or gamepad input.</p>
          <div id="bindings-head"><span>RetroPad</span><span>Keyboard</span><span>Gamepad</span></div>
          <div id="bindings-rows"></div>
          <div id="bindings-actions">
            <button id="bindings-close">Close</button>
            <button id="bindings-reset">Reset to defaults</button>
          </div>
        </div>
      </div>
    </main>
    <canvas id="placeholder-canvas" width="512" height="448"></canvas>
    <canvas id="canvas" width="512" height="448"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
